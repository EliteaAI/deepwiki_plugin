services:
  pylon_deepwiki:
    image: getcarrier/pylon:1.2.7
    user: "33:33"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    env_file:
      - ./envs/default.env
      - ./envs/override.env
    environment:
      - NAME=pylon-deepwiki
      - PYLON_WEB_RUNTIME=gevent
      - PYLON_CONFIG_SEED=file:/data/pylon.yml
    volumes:
      - ./pylon_deepwiki:/data
    ports:
      - 8090:8080
