services:
  pylon_deepwiki:
    image: getcarrier/pylon:1.2.25
    user: "33:33"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    env_file:
      - ./envs/default.env
      - ./envs/override.env
    environment:
      - NAME=pylon-deepwiki
      - PYLON_WEB_RUNTIME=gevent
      - PYLON_CONFIG_SEED=file:/data/pylon.yml
    # =============================================================================
    # Core Search & Expansion Flags
    # =============================================================================
    # All performance optimizations are now enabled by default in code.
    # Only override these if you need non-default behavior:
    # - DEEPWIKI_CHECKPOINT_BACKEND=memory  # Enable state snapshots (uses RAM)
    # - DEEPWIKI_ENABLE_RERANKER=1          # Enable cross-encoder reranker (slow but better quality)
    # - DEEPWIKI_PROFILE_EXPANSION=1        # Log timing breakdown for content expansion stages
      - DEEPWIKI_ENABLE_FTS5=1              # FTS5 full-text search index
      - DEEPWIKI_SMART_EXPANSION=1          # Graph-aware expansion: inheritance, composition, creates, alias chains
      - DEEPWIKI_HYBRID_FUSION=1            # RRF hybrid fusion in search_codebase (FTS5 + vector store)
      - DEEPWIKI_ASK_AGENTIC=1              # Agentic ask tool with tool-calling
      # =========================================================================
      # Graph quality back-port (defaults match wikis/feature_flags.py).
      # Listed here for visibility / docker-level overrides; identical to
      # the dataclass defaults so stripping them keeps the same behaviour.
      # =========================================================================
      - DEEPWIKI_ORPHAN_CASCADE_V2=1            # Pass1 explicit refs → Pass2 hybrid RRF → tiered FTS → directory
      - DEEPWIKI_ORPHAN_REUSE_EMBEDDINGS=1      # Reuse persisted vectors instead of re-embedding orphans
      - DEEPWIKI_ORPHAN_HYBRID_SEARCH=1         # FTS5+Vec RRF fusion in orphan resolution Pass 2
      - DEEPWIKI_ORPHAN_RRF_K=60                # RRF k constant for orphan hybrid fusion
      - DEEPWIKI_ORPHAN_RRF_THRESHOLD=0.02      # Minimum RRF score for an orphan→target edge
      - DEEPWIKI_FTS_MIN_SCORE_NORM=0.15        # Min normalized FTS score for orphan/lexical edges
      - DEEPWIKI_NODE_ID_STYLE=rel_path         # Stable rel_path-derived collision suffix
      - DEEPWIKI_QUALIFIED_NAME_INDEX=1         # Build _qualified_name_index + _fqn_index on graphs
      - DEEPWIKI_CROSS_LANGUAGE_LINKING=1       # L0–L3 cross-language linker in Phase 1c
      - DEEPWIKI_API_SURFACE_EXTRACTION=1       # Extract REST/gRPC/GraphQL/FFI/CLI surfaces per node
      - DEEPWIKI_TEST_LINKER=0                  # Off by default — pair test↔production via heuristics
      - DEEPWIKI_FTS_STOPWORD_GATE=1            # Skip FTS lookups for short / generic tokens (init/main/api/...)
      - DEEPWIKI_ORPHAN_LEXICAL_TIERED=1        # Tiered lexical T1–T4 cascade with directory + ARCH filtering
      - DEEPWIKI_ORPHAN_LEXICAL_IDF_GATE=1      # Gate eligible tiers by symbol IDF
      - DEEPWIKI_ORPHAN_REST_DISAMBIG=1         # Rewrite generic REST class queries to "<file_stem> <symbol>"
    # =============================================================================
    # Wiki Structure Planner — SWITCH BETWEEN MODES HERE
    # =============================================================================
    # Options:
    #   deepagents  — LLM-heavy DeepAgents loop (~50-74 tool calls, ~150K-400K tokens)
    #   cluster     — Unified DB + mathematical clustering (Louvain/sub-Louvain, 1 LLM call per cluster)
    #   auto        — Auto-detect (falls back to deepagents if no unified DB available)
    #
    # Default planner is now picked from the request payload (UI toggle / API).
    # The env var below stays as a power-user override; leave it commented to
    # let each request choose. Cluster is the recommended default for most repos.
#      - DEEPWIKI_STRUCTURE_PLANNER=cluster
    # =============================================================================
    # Agentic V2 Page Generation Tuning
    # =============================================================================
      - DEEPWIKI_AGENTIC_PLAN_MAX_OUTPUT_TOKENS=8096
      - DEEPWIKI_AGENTIC_SECTION_MAX_OUTPUT_TOKENS=8096
      - DEEPWIKI_AGENTIC_SECTION_CONTEXT_TOKENS=25000
      - DEEPWIKI_AGENTIC_SECTION_CODE_TOKENS=18750
      - DEEPWIKI_AGENTIC_SIGNATURES_TOKEN_BUDGET=6250
      - DEEPWIKI_AGENTIC_SIGNATURES_MAX=80
      - DEEPWIKI_AGENTIC_SYMBOL_INDEX_MAX=250
      - DEEPWIKI_AGENTIC_PATHS_MAX=120
      - DEEPWIKI_AGENTIC_FAST_TOKEN_ESTIMATE=1
      - DEEPWIKI_AGENTIC_PLAN_TRACE=1
      - DEEPWIKI_AGENTIC_PLAN_MODE=queries
      - DEEPWIKI_AGENTIC_STAGE_B=1
      - DEEPWIKI_AGENTIC_STAGE_B_TRACE=1
      - DEEPWIKI_AGENTIC_SECTION_SEED_K=15
      - DEEPWIKI_AGENTIC_EXPAND_CAP_PER_EDGE=3
      - DEEPWIKI_AGENTIC_EXPAND_MAX_HOPS=1
      - DEEPWIKI_AGENTIC_PRIMARY_LIMIT=10
      - DEEPWIKI_AGENTIC_OUTLINE_DIRS_MAX=25
      - DEEPWIKI_AGENTIC_OUTLINE_FILES_MAX=20
      - DEEPWIKI_AGENTIC_GENERATE_INTRO=1
      - DEEPWIKI_AGENTIC_GENERATE_OVERVIEW=0
      - DEEPWIKI_AGENTIC_GENERATE_CONCLUSION=1
      - DEEPWIKI_AGENTIC_OVERVIEW_SECTIONS_MAX=2
      - DEEPWIKI_AGENTIC_INTRO_MAX_OUTPUT_TOKENS=4096
      - DEEPWIKI_AGENTIC_PAGE_CONTEXT_PER_SECTION=4
      - DEEPWIKI_AGENTIC_PAGE_CONTEXT_SECTIONS_MAX=8
      - DEEPWIKI_AGENTIC_DROP_EXPANDED_DOCS=1
    # =============================================================================
    # Token & Context Optimization
    # =============================================================================
    # Skip 60K+ repository_context in page generation (saves tokens)
      - DEEPWIKI_SKIP_REPO_CONTEXT_FOR_PAGES=1
    # Structured JSON analysis instead of verbose markdown (~10x token reduction)
      - DEEPWIKI_USE_STRUCTURED_REPO_ANALYSIS=1
    # Query-optimized context extraction from structured analysis
      - DEEPWIKI_ASK_USE_OPTIMIZED_CONTEXT=1
    # =============================================================================
    # Doc/Code Separation
    # =============================================================================
    # Route docs to vector store only (not graph) — reduces RAM by ~3x
      - DEEPWIKI_DOC_SEPARATE_INDEX=1
    # Semantic retrieval (Ensemble + EmbeddingsFilter) for docs
      - DEEPWIKI_DOC_SEMANTIC_RETRIEVAL=1
    # Auto-retrieve docs during generation using retrieval_query
      - DEEPWIKI_AUTO_TARGET_DOCS=1
    # =============================================================================
    # Unified Graph & Clustering
    # =============================================================================
    # Single SQLite DB with FTS5 + sqlite-vec, used by the cluster planner and
    # the unified retriever. Hard-coded ON in production deployments.
      - DEEPWIKI_UNIFIED_DB=1
      - DEEPWIKI_UNIFIED_RETRIEVER=1
      - DEEPWIKI_LEGACY_INDEXES=0
    # =============================================================================
    # User-facing planner overrides
    # =============================================================================
    # exclude_tests is now driven from the request payload (UI toggle). The env
    # var below stays as a power-user/global override; leave it commented to
    # let each request decide. Test nodes are still indexed for ask/deep_research.
#      - DEEPWIKI_EXCLUDE_TESTS=1
    volumes:
      - ./pylon_deepwiki:/data
    ports:
      - 8090:8080
