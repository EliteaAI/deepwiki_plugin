{{- if .Values.jobs.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "deepwiki.fullname" . }}-job-manager
  labels:
    {{- include "deepwiki.labels" . | nindent 4 }}
rules:
  # Create, list, get, delete Jobs for wiki generation
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Access pods for log streaming
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
{{- end }}
