apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deepwiki.fullname" . }}-config
  labels:
    {{- include "deepwiki.labels" . | nindent 4 }}
data:
  pylon.yml: |
    #
    # General server config
    #
    server:
      name: pylon-deepwiki
      path: /
      proxy:
        x_for: 1
        x_proto: 1
        x_host: 1
      host: "0.0.0.0"
      port: 8080
      health:
        healthz: true
        livez: true
        readyz: true

    #
    # Logging
    #
    log:
      level: info

    #
    # Pylon DB
    #
    pylon_db:
      engine_url: sqlite:////data/pylon.db

    #
    # Local paths to modules and config
    #
    modules:
      plugins:
        provider:
          type: folder
          path: /data/plugins
      #
      requirements:
        mode: relaxed
        activation: bulk
        cache: /data/cache/pip
        provider:
          type: folder
          path: /data/requirements
      #
      config:
        provider:
          type: folder
          path: /data/configs
      #
      preload:
        bootstrap:
          provider:
            type: git
            delete_git_dir: false
            depth: null
          source: https://github.com/centry-core/bootstrap.git
          branch: {{ .Values.config.alitaRelease }}

  deepwiki_plugin.yml: |
    # Wiki Builder Plugin Configuration
    service_location_url: {{ include "deepwiki.serviceLocationUrl" . }}
    base_path: {{ .Values.config.basePath }}
    {{- with .Values.config.aiRunPlatform }}
    {{- if .url }}
    ai_run_platform_url: {{ .url }}
    {{- if .token }}
    ai_run_platform_token: {{ .token }}
    {{- end }}
    {{- if .verify }}
    ai_run_platform_verify: {{ .verify }}
    {{- end }}
    {{- if .timeout }}
    ai_run_platform_timeout: {{ .timeout | int }}
    {{- end }}
    {{- if .delay }}
    ai_run_platform_delay: {{ .delay | int }}
    {{- end }}
    {{- end }}
    {{- end }}

  bootstrap.yml: |
    # Bootstrap plugin configuration
    plugin_repo:
    - type: elitea_github
      release: {{ .Values.config.pluginBranch | default .Values.config.alitaRelease }}
      {{- if .Values.config.licenseUsername }}
      license_username: {{ .Values.config.licenseUsername }}
      {{- end }}
      {{- if .Values.config.licensePassword }}
      license_password: {{ .Values.config.licensePassword }}
      {{- end }}
      add_source_data: false
      add_head_data: false

    preordered_plugins:
    - deepwiki_plugin

  env.yml: |
    # Environment configuration for DeepWiki
    APP_URL: {{ include "deepwiki.serviceLocationUrl" . }}
    ALITA_RELEASE: {{ .Values.config.alitaRelease }}
    {{- if .Values.config.licenseUsername }}
    LICENSE_USERNAME: {{ .Values.config.licenseUsername }}
    {{- end }}
    {{- if .Values.config.licensePassword }}
    LICENSE_PASSWORD: {{ .Values.config.licensePassword }}
    {{- end }}
