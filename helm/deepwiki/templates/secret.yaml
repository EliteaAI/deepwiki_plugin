apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deepwiki.fullname" . }}-secrets
  labels:
    {{- include "deepwiki.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.config.licensePassword }}
  license-password: {{ .Values.config.licensePassword | b64enc | quote }}
  {{- end }}
