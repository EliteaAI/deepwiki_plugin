# DeepWiki Helm Chart Values
# =============================================================================
# Standalone plugin deployment (no Redis/queue dependencies)
# See SCALABILITY_KUBERNETES.md for architecture details
# =============================================================================

# =============================================================================
# Global Settings
# =============================================================================
nameOverride: ""
fullnameOverride: ""

# =============================================================================
# Image Configuration
# =============================================================================
image:
  repository: getcarrier/pylon
  tag: "1.2.25"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Deployment Configuration
# =============================================================================
combined:
  enabled: true
  replicaCount: 1
  
  resources:
    requests:
      cpu: 500m
      memory: 1536Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  
  # Pylon runtime (gevent for async I/O)
  pylonRuntime: gevent
  
  # Long grace period to allow running wiki generations to complete
  # Wiki generation can take 10-60 minutes for large repos
  terminationGracePeriodSeconds: 3600

  # HPA configuration
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetMemoryUtilizationPercentage: 75

# =============================================================================
# Service Configuration
# =============================================================================
service:
  type: ClusterIP
  port: 8080

# =============================================================================
# DeepWiki Plugin Configuration
# =============================================================================
config:
  # Platform integration URL
  # This must be accessible from elitea_core for provider registration
  # Example: http://deepwiki.deepwiki.svc.cluster.local:8080
  # Leave empty to auto-generate based on release name
  serviceLocationUrl: ""
  
  # Base path for wiki builder files (inside container)
  basePath: /data/wiki_builder
  
  # Alita release branch for bootstrap plugin
  alitaRelease: main
  
  # DeepWiki plugin branch (defaults to main)
  # Set to feature branch name for testing
  pluginBranch: "main"
  
  # GitHub credentials for cloning private repos (optional)
  # These are defaults - actual credentials come from toolkit config at runtime
  licenseUsername: ""
  licensePassword: ""
  
  # Force plugin update on pod restart
  # When enabled, an initContainer removes the plugins folder before starting
  # This forces a fresh git clone from GitHub on every pod restart
  # Useful for development/staging where you want latest code on restart
  # For production, set to false and use helm upgrade to control updates
  forcePluginUpdate: false

  # Autoregistration with AI/Run platform (optional)
  # When configured, the plugin registers its provider descriptor on startup
  aiRunPlatform:
    url: ""           # Platform registration endpoint URL
    token: ""         # Bearer token for authentication
    verify: false     # Verify SSL certificates
    timeout: 120      # HTTP timeout (seconds) for registration request
    delay: 2          # Delay (seconds) before registration attempt

# =============================================================================
# DeepWiki Feature Flags (Environment Variables)
# =============================================================================
env:
  # Search and retrieval
  DEEPWIKI_ENABLE_FTS5: "1"
  DEEPWIKI_SMART_EXPANSION: "1"
  DEEPWIKI_HYBRID_FUSION: "1"
  DEEPWIKI_ASK_AGENTIC: "1"
  
  # Structure planner
  # The default planner is now picked from the request payload (UI toggle / API).
  # Uncomment DEEPWIKI_STRUCTURE_PLANNER below to force a global default; leave
  # it unset to let each request decide. Cluster is the recommended default.
  # DEEPWIKI_STRUCTURE_PLANNER: "cluster"
  
  # Agentic generation settings
  DEEPWIKI_AGENTIC_PLAN_MAX_OUTPUT_TOKENS: "8096"
  DEEPWIKI_AGENTIC_SECTION_MAX_OUTPUT_TOKENS: "8096"
  DEEPWIKI_AGENTIC_SECTION_CONTEXT_TOKENS: "25000"
  DEEPWIKI_AGENTIC_SECTION_CODE_TOKENS: "18750"
  DEEPWIKI_AGENTIC_SIGNATURES_TOKEN_BUDGET: "6250"
  DEEPWIKI_AGENTIC_SIGNATURES_MAX: "80"
  DEEPWIKI_AGENTIC_SYMBOL_INDEX_MAX: "250"
  DEEPWIKI_AGENTIC_PATHS_MAX: "120"
  DEEPWIKI_AGENTIC_FAST_TOKEN_ESTIMATE: "1"
  DEEPWIKI_AGENTIC_PLAN_TRACE: "1"
  DEEPWIKI_AGENTIC_PLAN_MODE: "queries"
  DEEPWIKI_AGENTIC_STAGE_B: "1"
  DEEPWIKI_AGENTIC_STAGE_B_TRACE: "1"
  DEEPWIKI_AGENTIC_SECTION_SEED_K: "15"
  DEEPWIKI_AGENTIC_EXPAND_CAP_PER_EDGE: "3"
  DEEPWIKI_AGENTIC_EXPAND_MAX_HOPS: "1"
  DEEPWIKI_AGENTIC_PRIMARY_LIMIT: "10"
  DEEPWIKI_AGENTIC_OUTLINE_DIRS_MAX: "25"
  DEEPWIKI_AGENTIC_OUTLINE_FILES_MAX: "20"
  DEEPWIKI_AGENTIC_GENERATE_INTRO: "1"
  DEEPWIKI_AGENTIC_GENERATE_OVERVIEW: "0"
  DEEPWIKI_AGENTIC_GENERATE_CONCLUSION: "1"
  DEEPWIKI_AGENTIC_OVERVIEW_SECTIONS_MAX: "2"
  DEEPWIKI_AGENTIC_INTRO_MAX_OUTPUT_TOKENS: "4096"
  DEEPWIKI_AGENTIC_PAGE_CONTEXT_PER_SECTION: "4"
  DEEPWIKI_AGENTIC_PAGE_CONTEXT_SECTIONS_MAX: "8"
  DEEPWIKI_AGENTIC_DROP_EXPANDED_DOCS: "1"
  
  # Performance optimizations
  DEEPWIKI_SKIP_REPO_CONTEXT_FOR_PAGES: "1"
  DEEPWIKI_USE_STRUCTURED_REPO_ANALYSIS: "1"
  DEEPWIKI_ASK_USE_OPTIMIZED_CONTEXT: "1"
  
  # Doc/Code separation
  DEEPWIKI_DOC_SEPARATE_INDEX: "1"
  DEEPWIKI_DOC_SEMANTIC_RETRIEVAL: "1"
  DEEPWIKI_AUTO_TARGET_DOCS: "1"

# =============================================================================
# K8s Jobs-Based Scaling
# =============================================================================
# When enabled, wiki generation runs as K8s Jobs.
# The /slots endpoint queries K8s API for active job count.
#
# Two sub-modes (auto-detected):
#
# 1. Jobs+PVC (default): Workers mount the same PVC as the controller.
#    - Input/output via shared filesystem
#    - Simpler setup, requires RWX storage class
#
# 2. Jobs+API (recommended for production): Workers use emptyDir volumes.
#    - Input/output via ELITEA platform artifact HTTP API
#    - Workers are fully stateless — no PVC dependency
#    - Artifact API credentials are derived per-request from llm_settings
#      (injected into worker pods as env vars by the controller)
#
# Prerequisites:
# - RBAC enabled (Role + RoleBinding created automatically)
# - Jobs+PVC: Shared RWX PVC
# - Jobs+API: Platform artifact API access (via llm_settings)
# =============================================================================
jobs:
  enabled: false  # Set to true to enable Jobs-based scaling
  
  # Maximum concurrent Jobs cluster-wide
  maxConcurrentJobs: 3
  
  # TTL for completed Jobs (seconds)
  # Jobs are auto-deleted after this time to prevent accumulation
  ttlSecondsAfterFinished: 300
  
  # Worker image (defaults to same as API pod image)
  # workerImage: "getcarrier/pylon:1.2.7"
  # workerImagePullPolicy: IfNotPresent  # Set to Never for local minikube images

  # Service account for worker Job pods.
  # Workers make zero K8s API calls, so they don't need RBAC.
  # The controller SA (with Job management RBAC) is separate.
  workerServiceAccount: "default"

  # Job resource configuration
  resources:
    requests:
      memory: 2Gi
      cpu: "1"
    limits:
      memory: 8Gi
      cpu: "4"

  # ---------------------------------------------------------------------------
  # Platform Artifact Transport (Jobs+API mode)
  # ---------------------------------------------------------------------------
  # In Jobs+API mode, artifact API credentials are derived per-request from
  # llm_settings (provided by the ELITEA platform on each invocation).
  # The controller injects these into worker pods as environment variables.
  #
  # The bucket name ("wiki_artifacts") is hardcoded in the plugin code.
  # No Helm configuration is needed for artifact storage.
  # ---------------------------------------------------------------------------

# =============================================================================
# Storage Configuration
# =============================================================================
storage:
  # Persistent volume for caches, repos, and indexes
  persistence:
    enabled: true
    storageClass: "deepwiki-rwx"  # RWX storage class for multi-replica
    size: 50Gi
    accessModes:
      - ReadWriteMany  # Required for multi-replica static pool

  # Existing PVC name (if you want to use an existing PVC)
  existingClaim: ""

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  hosts:
    - host: deepwiki.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: deepwiki-tls
    #   hosts:
    #     - deepwiki.local

# =============================================================================
# Security Configuration
# =============================================================================
securityContext:
  runAsUser: 33
  runAsGroup: 33
  fsGroup: 33

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 33  # www-data group - ensures mounted volumes are group-writable

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true
  annotations: {}
  name: ""

# =============================================================================
# Pod Settings
# =============================================================================
nodeSelector: {}

tolerations: []

affinity: {}

# Pod disruption budget (protect running wiki generations)
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# =============================================================================
# Health Check Configuration
# =============================================================================
healthCheck:
  liveness:
    path: /healthz
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5
  readiness:
    path: /readyz
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
